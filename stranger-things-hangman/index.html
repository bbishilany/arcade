<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STRANGER THINGS HANGMAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Name entry overlay -->
    <div id="nameOverlay" class="name-overlay" style="display:none;">
        <div class="name-box">
            <div class="name-title">ENTER YOUR NAME</div>
            <div id="nameScore" class="name-score"></div>
            <input type="text" id="nameInput" class="name-input" maxlength="8"
                   placeholder="YOUR NAME" autocomplete="off" autocapitalize="characters"
                   spellcheck="false">
            <button id="nameSubmit" class="name-submit">OK</button>
        </div>
    </div>

    <!-- Touch letter grid (A-Z) - visible on touch devices only -->
    <div id="touchControls">
        <div class="letter-row">
            <button class="letter-btn" id="letter-A">A</button>
            <button class="letter-btn" id="letter-B">B</button>
            <button class="letter-btn" id="letter-C">C</button>
            <button class="letter-btn" id="letter-D">D</button>
            <button class="letter-btn" id="letter-E">E</button>
            <button class="letter-btn" id="letter-F">F</button>
            <button class="letter-btn" id="letter-G">G</button>
            <button class="letter-btn" id="letter-H">H</button>
            <button class="letter-btn" id="letter-I">I</button>
        </div>
        <div class="letter-row">
            <button class="letter-btn" id="letter-J">J</button>
            <button class="letter-btn" id="letter-K">K</button>
            <button class="letter-btn" id="letter-L">L</button>
            <button class="letter-btn" id="letter-M">M</button>
            <button class="letter-btn" id="letter-N">N</button>
            <button class="letter-btn" id="letter-O">O</button>
            <button class="letter-btn" id="letter-P">P</button>
            <button class="letter-btn" id="letter-Q">Q</button>
            <button class="letter-btn" id="letter-R">R</button>
        </div>
        <div class="letter-row">
            <button class="letter-btn" id="letter-S">S</button>
            <button class="letter-btn" id="letter-T">T</button>
            <button class="letter-btn" id="letter-U">U</button>
            <button class="letter-btn" id="letter-V">V</button>
            <button class="letter-btn" id="letter-W">W</button>
            <button class="letter-btn" id="letter-X">X</button>
            <button class="letter-btn" id="letter-Y">Y</button>
            <button class="letter-btn" id="letter-Z">Z</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
