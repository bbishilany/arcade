<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GALAGA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Name entry overlay — shown after game over -->
    <div id="nameOverlay" class="name-overlay" style="display:none;">
        <div class="name-box">
            <div class="name-title">ENTER YOUR NAME</div>
            <div id="nameScore" class="name-score"></div>
            <input type="text" id="nameInput" class="name-input" maxlength="8"
                   placeholder="YOUR NAME" autocomplete="off" autocapitalize="characters"
                   spellcheck="false">
            <button id="nameSubmit" class="name-submit">OK</button>
        </div>
    </div>

    <!-- Touch controls — only visible on touchscreens -->
    <div id="touchControls">
        <div class="touch-left">
            <button class="touch-btn" id="btnLeft" aria-label="Move Left">&#9664;</button>
            <button class="touch-btn" id="btnRight" aria-label="Move Right">&#9654;</button>
        </div>
        <div class="touch-right">
            <button class="touch-btn touch-fire" id="btnFire" aria-label="Fire">FIRE</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
